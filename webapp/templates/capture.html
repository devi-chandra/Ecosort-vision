<!DOCTYPE html>
<html>
<head>
    <title>Capture Image</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<div class="container">
    <h1 class="title">📸 Capture Image</h1>

    <video id="video" autoplay></video>
    <button id="snap" class="btn camera-btn">Take Photo</button>

    <canvas id="canvas" style="display:none;"></canvas>

    <form id="uploadForm" action="/capture_upload" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="capturedImage" id="capturedImage">
        <button type="submit" class="btn upload-btn" style="display:none;" id="submitBtn">
            Upload for Classification
        </button>
    </form>
</div>

<script src="/static/js/script.js"></script>

</body>
</html>
