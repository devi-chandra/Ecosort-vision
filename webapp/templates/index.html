<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EchoSort Vision — Final</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg1:#0A0F1F; --bg2:#0D1329; --bg3:#080A17;
    --cyan:#00E5FF; --mint:#8AFFC1; --violet:#A45CFF; --pink:#FF4F6A;
    --gold:#FFD166; --softblue:#9FE8FF; --neonyellow:#FFF06A;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    padding:0;
    height:100vh;
    background: linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    font-family:"Poppins",sans-serif;
    color:#fff;
    overflow:hidden;
  }

  /* CANVAS (behind everything) */
  #bgCanvas{
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events:none;
  }

  /* MAIN UI */
  .hero{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:24px;
    z-index:5; /* UI stays above shapes */
  }

  .left{ width:45%; max-width:720px }
  .title{
    font-size:52px;
    font-weight:700;
    margin:0 0 10px 0;
    line-height:1;
    background: linear-gradient(90deg,var(--cyan),var(--mint),var(--violet),var(--pink));
    -webkit-background-clip:text; 
    -webkit-text-fill-color:transparent;
  }
  .subtitle{ margin:0 0 28px 0; font-size:18px; opacity:0.9 }

  .buttons{ display:flex; gap:16px; align-items:center; z-index:200; }
  .btn{
    padding:12px 26px;
    border-radius:12px;
    font-weight:600;
    color:#fff;
    background: linear-gradient(135deg,var(--cyan),var(--violet));
    text-decoration:none;
    box-shadow:0 10px 28px rgba(0,229,255,0.18);
    transition: transform .16s ease, box-shadow .16s ease;
    cursor:pointer;
    z-index:200;
  }
  .btn:hover{
    transform:translateY(-3px);
    box-shadow:0 16px 40px rgba(164,92,255,0.22);
  }

  input[type=file]{ display:none }

  .right{
    width:45%;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    min-width:360px;
    z-index:5;
  }

  .circle{
    width:360px;
    height:360px;
    border-radius:50%;
    background: conic-gradient(var(--cyan),var(--mint),var(--violet),var(--pink),var(--cyan));
    animation: circleRotate 12s linear infinite;
    box-shadow:0 0 40px rgba(0,229,255,0.55);
  }

  @keyframes circleRotate { from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .icon{
    position:absolute;
    font-size:44px;
    animation: float 3.6s ease-in-out infinite alternate;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,0.55));
    z-index:400;
  }

  .i1{ top:-12px; left:150px } 
  .i2{ top:82px; right:-10px } 
  .i3{ bottom:18px; right:60px }
  .i4{ bottom:-15px; left:150px } 
  .i5{ top:90px; left:-10px } 
  .i6{ top:150px; right:128px }

  @keyframes float {
    0%{ transform:translateY(0) }
    100%{ transform:translateY(-18px) }
  }

</style>
</head>

<body>

<!-- SHAPE CANVAS -->
<canvas id="bgCanvas"></canvas>

<div class="hero">
  <div class="left">
    <h1 class="title">EchoSort Vision</h1>
    <p class="subtitle">Crisp • Vibrant • Intelligent Waste Detection</p>

    <!-- FIXED UPLOAD FORM (WORKS 100%) -->
    <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">

  <input 
    id="fileInput"
    type="file"
    name="image"
    accept="image/*"
    onchange="this.form.submit();"
  >

  <div class="buttons">
    <label for="fileInput" class="btn">Upload Image</label>
    <a class="btn" href="/capture">Use Camera</a>
  </div>

</form>
  </div>

  <div class="right">
    <div class="circle"></div>
    <div class="icon i1">♻️</div>
    <div class="icon i2">🍌</div>
    <div class="icon i3">🗑️</div>
    <div class="icon i4">⚠️</div>
    <div class="icon i5">📦</div>
    <div class="icon i6">🧴</div>
  </div>
</div>

<!-- ORIGINAL SHAPE ANIMATION JS (unchanged) -->
<script>
/* =========================================================
   BIG SHAPE-FORMING NEON DOTS ENGINE  
   (Full Script — unchanged performance-optimized version)
   ========================================================= */

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d', { alpha: true });

let W = canvas.width = innerWidth;
let H = canvas.height = innerHeight;

// adaptive amount of dots
const DOT_COUNT = Math.max(220, Math.floor((W * H) / 7000));
const BASE_SPEED = 0.45;
const SHAPE_DISPLAY_MS = 3300;
const SHAPE_GAP_MS = 1700;

const LEFT_CX_RATIO = 0.28; 
const CY_RATIO = 0.52;
const SCALE_MED = 120;

const shapeColors = {
  heart: { fill:'#FF4F6A', glow:'#FF6B9A' },
  star: { fill:'#FFD166', glow:'#FFE79B' },
  moon: { fill:'#9FE8FF', glow:'#CFF6FF' },
  infinity: { fill:'#A45CFF', glow:'#CFA8FF' },
  butterfly: { fill:'#8AFFC1', glow:'#BFF8D8' },
  flower: { fill:'#FF8ACB', glow:'#FFC1E8' },
  planet: { fill:'#00C8FF', glow:'#9FE8FF' },
  galaxy: { fill:'#9D7AFF', glow:'#CDB8FF' },
  lightning: { fill:'#FFF06A', glow:'#FFF8B8' }
};

const shapesSeq = [
  'heart','star','moon','infinity',
  'butterfly','flower','planet','galaxy','lightning'
];

function random(a,b){ return Math.random()*(b-a)+a; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

function hexToRgba(hex,alpha=1){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

class Dot {
  constructor(i){
    this.i = i;
    this.reset(true);
  }

  reset(init=false){
    this.x = random(0, W);
    this.y = random(0, H);
    this.vx = random(-BASE_SPEED, BASE_SPEED);
    this.vy = random(-BASE_SPEED, BASE_SPEED);
    this.size = random(1.9,3.8);
    this.target = null;

    this.color = {
      fill: hexToRgba('#00E5FF',0.85),
      glow: '#00E5FF'
    };
  }

  setColor(c){
    this.color = {
      fill: hexToRgba(c.fill,0.92),
      glow: c.glow
    };
  }

  update(){
    if(this.target){
      this.x += (this.target.x - this.x) * (0.04 + Math.random()*0.02);
      this.y += (this.target.y - this.y) * (0.04 + Math.random()*0.02);
    } else {
      this.x += this.vx;
      this.y += this.vy;
      this.vx += random(-0.02,0.02);
      this.vy += random(-0.02,0.02);
    }

    if(this.x < -12) this.x = W + 12;
    if(this.x > W + 12) this.x = -12;
    if(this.y < -12) this.y = H + 12;
    if(this.y > H + 12) this.y = -12;

    ctx.beginPath();
    ctx.fillStyle = this.color.fill;
    ctx.shadowColor = this.color.glow;
    ctx.shadowBlur = 20;
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

const dots = [];
for(let i=0;i<DOT_COUNT;i++) dots.push(new Dot(i));

/* ---------- SHAPE GENERATORS ---------- */

function genHeart(cx,cy,scale){
  const pts=[];
  for(let a=0;a<Math.PI*2;a+=0.08){
    let x = 16*Math.pow(Math.sin(a),3);
    let y = -(13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a));
    pts.push({x: cx + x*scale*0.09, y: cy + y*scale*0.09});
  }
  return pts;
}

function genStar(cx,cy,scale){
  const pts=[];
  const spikes=5;
  for(let i=0;i<spikes*2;i++){
    const r = (i%2===0)? scale : scale*0.45;
    const ang = (i/(spikes*2))*Math.PI*2;
    pts.push({x: cx + r*Math.cos(ang), y: cy + r*Math.sin(ang)});
  }
  return pts;
}

function genMoon(cx,cy,scale){
  const pts=[];
  for(let a=0;a<Math.PI*2;a+=0.06){
    const x = cx + scale*Math.cos(a);
    const y = cy + scale*Math.sin(a);
    if(Math.cos(a) > -0.18) pts.push({x,y});
  }
  return pts;
}

function genInfinity(cx,cy,scale){
  const pts=[];
  for(let t=-Math.PI;t<Math.PI;t+=0.06){
    pts.push({
      x: cx + scale * Math.sin(t),
      y: cy + (scale/2) * Math.sin(t)*Math.cos(t)
    });
  }
  return pts;
}

function genButterfly(cx,cy,scale){
  const pts=[];
  for(let t=-Math.PI;t<Math.PI;t+=0.05){
    const r = Math.exp(Math.cos(t)) - 2*Math.cos(4*t) - Math.pow(Math.sin(t/12),5);
    pts.push({
      x: cx + scale*0.6 * r * Math.cos(t),
      y: cy + scale*0.45 * r * Math.sin(t)
    });
  }
  return pts;
}

function genFlower(cx,cy,scale){
  const pts=[];
  const petals=6;
  for(let a=0;a<Math.PI*2;a+=0.06){
    const r = Math.cos(petals*a)*(scale*0.45) + (scale*0.6);
    pts.push({x: cx + r*Math.cos(a), y: cy + r*Math.sin(a)});
  }
  return pts;
}

function genPlanet(cx,cy,scale){
  const pts=[];
  for(let a=0;a<Math.PI*2;a+=0.06){
    pts.push({x: cx + (scale*0.6)*Math.cos(a), y: cy + (scale*0.6)*Math.sin(a)});
  }
  for(let a=0;a<Math.PI*2;a+=0.12){
    pts.push({x: cx + scale*1.05*Math.cos(a), y: cy + scale*0.35*Math.sin(a)});
  }
  return pts;
}

function genGalaxy(cx,cy,scale){
  const pts=[];
  for(let t=0;t<Math.PI*5;t+=0.08){
    const r = 8 + t*6;
    pts.push({
      x: cx + (r * Math.cos(t)) * (scale/150),
      y: cy + (r * Math.sin(t)) * (scale/150)
    });
  }
  return pts;
}

function genLightning(cx,cy,scale){
  const pts=[];
  let x = cx - scale*0.3;
  let y = cy - scale*0.7;
  pts.push({x,y});
  for(let i=0;i<12;i++){
    x += scale*0.12 + random(-scale*0.06,scale*0.06);
    y += scale*0.15 + random(-scale*0.08,scale*0.08);
    pts.push({x,y});
  }
  return pts;
}

const shapeGenerators = {
  heart: genHeart, star: genStar, moon: genMoon, infinity: genInfinity,
  butterfly: genButterfly, flower: genFlower, planet: genPlanet,
  galaxy: genGalaxy, lightning: genLightning
};

/* ---------- DOT TARGET + COLOR HANDLING ---------- */

function assignTargets(points, colorObj){
  for(let i=0;i<dots.length;i++){
    const p = points[i % points.length];
    dots[i].target = p;
    dots[i].setColor(colorObj);
  }
}

function clearTargets(){
  for(const d of dots){
    d.target = null;
    d.setColor({ fill:'#00E5FF', glow:'#00E5FF' });
  }
}

function wait(ms){ return new Promise(res => setTimeout(res, ms)); }

/* ---------- MAIN SHAPE LOOP ---------- */

async function showShape(name){
  const colorObj = shapeColors[name] || { fill:'#00E5FF', glow:'#00E5FF' };
  const cx = W * LEFT_CX_RATIO;
  const cy = H * CY_RATIO;
  const scale = SCALE_MED;

  const pts = shapeGenerators[name](cx, cy, scale);

  assignTargets(pts, colorObj);
  await wait(SHAPE_DISPLAY_MS);

  clearTargets();
  await wait(SHAPE_GAP_MS);
}

async function shapeLoop(){
  while(true){
    for(const s of shapesSeq){
      await showShape(s);
    }
  }
}

/* ---------- ANIMATION TICK ---------- */

function animate(){
  ctx.clearRect(0,0,W,H);
  for(const d of dots) d.update();
  requestAnimationFrame(animate);
}

/* ---------- RESIZE HANDLER ---------- */

window.addEventListener('resize', ()=>{
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
});

/* ---------- STARTUP ---------- */

(function start(){
  for(const d of dots){
    d.x = random(0, W);
    d.y = random(0, H);
    d.vx = random(-0.6,0.6);
    d.vy = random(-0.6,0.6);
    d.setColor({ fill:'#00E5FF', glow:'#00E5FF' });
  }
  animate();
  setTimeout(()=> shapeLoop(), 700);
})();
</script>

</body>
</html>
